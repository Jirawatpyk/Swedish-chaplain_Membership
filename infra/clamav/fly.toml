# F7.1a US2 — Fly.io app config for ClamAV virus scanner.
#
# Deploy commands + secret rotation procedure live in
# infra/clamav/README.md. This file is committed as the source of
# truth; do not edit directly on Fly.io — `fly launch --copy-config`
# always reads from here.
#
# Why Fly.io (vs Vercel Functions): clamd is a long-running daemon
# that streams files over a TCP socket and holds the signature DB in
# memory (~250 MB). Vercel Functions are stateless + short-lived; a
# Fly machine is the natural fit and `sin` keeps it co-located with
# Neon Postgres (Singapore) for low-latency F7.1a control-plane RTT.

app = "clamav-swecham"
primary_region = "sin"

# Build from Dockerfile in this directory.
[build]
  dockerfile = "Dockerfile"

# Option D (2026-05-22): the PUBLIC surface is the HTTP scan-wrapper on
# :8080, exposed over HTTPS by the Fly edge (TLS termination via the
# `tls` handler + force_https). clamd itself listens on localhost only
# (Dockerfile `TCPAddr 127.0.0.1`) and is NOT in this service block —
# the wrapper is its sole client. Chamber-OS Vercel functions reach the
# wrapper at `https://clamav-swecham.fly.dev/scan` with a bearer token
# (CLAMAV_SCAN_SECRET). Allocate a public address before first deploy:
#   fly ips allocate-v6 -a clamav-swecham
#   fly ips allocate-v4 --shared -a clamav-swecham   # free shared v4
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

  # Plain HTTP on :80 → force-redirect to HTTPS.
  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  # HTTPS on :443 — Fly edge terminates TLS, forwards plain HTTP to the
  # wrapper on internal_port 8080.
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Application-level health check — GET /healthz pings clamd and
  # returns 200 "ok" only when the daemon answers PONG (503 otherwise).
  # grace_period covers the ~40-60s clamd signature-DB load on boot.
  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "90s"
    method = "get"
    path = "/healthz"

# VM memory floor — bumped 256mb → 2048mb on 2026-05-22 after the
# first deploy OOM-looped (boot → freshclam/clamd → SIGKILL exit 137 →
# reboot, health check never green). The original 256mb estimate was
# wrong: clamd loads the full signature set (daily.cvd ~355k sigs) into
# a ~1.2 GB resident matcher, and freshclam needs ~150 MB concurrently
# during updates — they cannot coexist in 256 MB. 2048 MB is the max
# for shared-cpu-1x and leaves headroom for a concurrent freshclam
# refresh. Bump to shared-cpu-2x (>2 GB) only if clamd RSS ever exceeds
# 2 GB (unlikely at single-tenant SweCham scale). See
# docs/runbooks/clamav-signature-stale.md.
[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"

# Mount a 1 GB persistent volume for the signature DB so freshclam
# does not redownload the ~250 MB ClamAV signature set on every
# machine restart. Volume name MUST be created via
# `fly volumes create clamav_data --region sin --size 1` before
# `fly deploy` (one-time, documented in README.md § Deploy).
[[mounts]]
  source = "clamav_data"
  destination = "/var/lib/clamav"
