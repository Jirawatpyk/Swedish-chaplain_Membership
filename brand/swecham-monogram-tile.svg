<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="SweCham app icon monogram">
  <title>SweCham — app icon (SC monogram on navy tile)</title>
  <defs>
    <linearGradient id="tileGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#103A63"/>
      <stop offset="1" stop-color="#0B2A4A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#tileGrad)"/>
  <text x="60" y="76" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="56" font-weight="700" letter-spacing="-2" fill="#FFFFFF">SC</text>
  <!-- gold accent rule (matches the lockup) -->
  <rect x="40" y="90" width="40" height="6" rx="3" fill="#F4C430"/>
</svg>
