<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 516 120" role="img" aria-label="SweCham — Thai-Swedish Chamber of Commerce">
  <title>SweCham primary horizontal lockup</title>
  <defs>
    <clipPath id="topCrossLk"><rect x="44" y="18" width="16" height="24"/></clipPath>
  </defs>
  <!-- symbol -->
  <g transform="translate(6,12) scale(0.92)">
    <circle cx="42" cy="48" r="20" fill="none" stroke="#0B2A4A" stroke-width="11"/>
    <circle cx="62" cy="48" r="20" fill="none" stroke="#F4C430" stroke-width="11"/>
    <g clip-path="url(#topCrossLk)">
      <circle cx="42" cy="48" r="20" fill="none" stroke="#0B2A4A" stroke-width="11"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="116" y="62"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="46" font-weight="700" letter-spacing="-1.5" fill="#0B2A4A">SweCham</text>
  <!-- gold accent rule -->
  <rect x="118" y="74" width="60" height="3.5" rx="1.75" fill="#F4C430"/>
  <!-- tagline -->
  <text x="118" y="96"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="11.5" font-weight="600" letter-spacing="2" fill="#5B6B7B">THAI–SWEDISH CHAMBER OF COMMERCE</text>
</svg>
