<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SweCham crest">
  <!-- Institutional roundel: a chamber of commerce reads as official/established -->
  <circle cx="120" cy="120" r="98" fill="#006AA7"/>
  <circle cx="120" cy="120" r="98" fill="none" stroke="#FECC00" stroke-width="6"/>
  <circle cx="120" cy="120" r="78" fill="none" stroke="#FECC00" stroke-width="3" opacity="0.7"/>
  <!-- SC monogram -->
  <text x="120" y="139" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="78" font-weight="700" fill="#FFFFFF" letter-spacing="-2">SC</text>
  <!-- microtext arcs -->
  <defs>
    <path id="topArc" d="M120 38 A82 82 0 0 1 120 38" />
    <path id="arcTop" d="M44 120 A76 76 0 0 1 196 120" />
    <path id="arcBot" d="M48 120 A72 72 0 0 0 192 120" />
  </defs>
  <text font-family="Georgia,serif" font-size="13" letter-spacing="3" fill="#FECC00">
    <textPath href="#arcTop" startOffset="50%" text-anchor="middle">THAI · SWEDISH</textPath>
  </text>
  <text font-family="Georgia,serif" font-size="12" letter-spacing="3" fill="#FECC00">
    <textPath href="#arcBot" startOffset="50%" text-anchor="middle">CHAMBER OF COMMERCE</textPath>
  </text>
</svg>
