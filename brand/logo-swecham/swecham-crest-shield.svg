  <text x="120" y="150" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="66" font-weight="700" fill="#FFFFFF" letter-spacing="-2">SC</text>
  <text x="120" y="185" text-anchor="middle" font-family="Georgia,serif" font-size="13" letter-spacing="2" fill="#FECC00">THAI · SWEDISH</text>
