  <path d="M52 78 H188" stroke="#FECC00" stroke-width="2"/>
  <text x="120" y="71" text-anchor="middle" font-family="Georgia,serif" font-size="15" letter-spacing="4" fill="#006AA7" font-weight="700">EST. CHAMBER</text>
